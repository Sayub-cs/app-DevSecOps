apiVersion: apps/v1
kind: Deployment
metadata:
  name: business-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: business-service
  template:
    metadata:
      labels:
        app: business-service
    spec:
      imagePullSecrets:
        - name: harbor-secret

      containers:
        - name: business-service
          image: GITLAB_VM_IP:5050/zartos/apptest/SERVICE_NAME:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8083

          env:
            - name: SERVER_PORT
              value: "8083"

            - name: DB_HOST
              value: postgres

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              value: postgres

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET

            - name: CORS_ALLOWED_ORIGINS
              value: "http://app.local,http://localhost"

            - name: STARTUP_DB_WAIT_ENABLED
              value: "true"

            - name: STARTUP_DB_WAIT_TIMEOUT_SECONDS
              value: "60"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5